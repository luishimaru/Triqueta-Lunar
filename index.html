<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triqueta Lunar | Diseños Personalizados</title>
    <meta name="description" content="Diseños personalizados y únicos en corte láser e impresión 3D. Rock, Metal y Gótico.">
    
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --text-main: #ffffff;
            --text-muted: #b3b3b3;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: transparent; 
            color: var(--text-main);
            font-family: 'Roboto', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            position: relative;
            overflow-x: hidden;
        }

        /* --- NEBLINA EN TONOS ROJOS --- */
        .smoke-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background: #050505; 
            overflow: hidden;
            pointer-events: none;
        }

        .smoke-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(55px); 
            animation: moveSmoke 15s infinite alternate ease-in-out; 
        }

        /* Cambio a paleta de rojos y carmesí */
        .smoke-1 {
            background: radial-gradient(circle, rgba(160, 15, 15, 0.45) 0%, transparent 70%); /* Rojo sangre */
            width: 80vw;
            height: 80vw;
            top: -10%;
            left: -20%;
        }

        .smoke-2 {
            background: radial-gradient(circle, rgba(120, 25, 25, 0.35) 0%, transparent 70%); /* Rojo oscuro */
            width: 70vw;
            height: 70vw;
            top: 40%;
            right: -20%;
            animation-delay: -5s;
        }

        .smoke-3 {
            background: radial-gradient(circle, rgba(60, 10, 10, 0.4) 0%, transparent 70%); /* Carmesí casi negro */
            width: 90vw;
            height: 90vw;
            bottom: -20%;
            left: 10%;
            animation-delay: -10s;
        }

        @keyframes moveSmoke {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, -40px) scale(1.15); }
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        .header { margin-bottom: 2rem; }

        .logo-img {
            width: 180px;
            height: auto;
            margin-bottom: 1rem;
            filter: drop-shadow(0 0 12px rgba(255,0,0,0.2)); /* Resplandor rojo en el logo */
        }

        h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 2.4rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
        }

        p.bio {
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 2rem;
        }

        .gallery-title {
            font-family: 'Oswald', sans-serif;
            font-size: 1.2rem;
            margin-bottom: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid #333;
            padding-bottom: 0.5rem;
            color: #e0e0e0;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 2.5rem;
        }

        .gallery-item {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #111;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #331111; /* Borde ligeramente rojo oscuro */
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .gallery-item:hover img { transform: scale(1.08); }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin-bottom: 3rem;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e0e0e0;
            text-decoration: none;
            padding: 1.1rem;
            border-radius: 8px;
            font-family: 'Oswald', sans-serif;
            font-size: 1.15rem;
            letter-spacing: 1.5px;
            position: relative;
            overflow: hidden;
            background: linear-gradient(145deg, #252525 0%, #161616 50%, #0d0d0d 100%);
            border: 1px solid #3a3a3a;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 4px 10px rgba(0, 0, 0, 0.6);
            text-shadow: 0 -1px 1px rgba(0, 0, 0, 0.8);
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .link-btn i {
            position: absolute;
            left: 1.5rem;
            font-size: 1.3rem;
        }

        .link-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 30%;
            height: 200%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0) 100%);
            transform: rotate(25deg);
            transition: none;
        }

        .link-btn:hover {
            border-color: #882222; /* El borde brilla en rojo al pasar el mouse */
            color: #ffffff;
            transform: translateY(-3px);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2), 0 0 15px rgba(200, 20, 20, 0.15), 0 6px 15px rgba(0, 0, 0, 0.8);
        }

        .link-btn:hover::after {
            left: 130%;
            transition: all 0.7s ease-in-out;
        }

        .wsp-btn {
            background: linear-gradient(145deg, #164724 0%, #0d2b15 50%, #05140a 100%);
            border: 1px solid #1f7a3e;
            color: #25D366;
            text-shadow: 0 -1px 1px rgba(0, 0, 0, 0.9);
        }

        .wsp-btn:hover {
            background: linear-gradient(145deg, #1e5c2f 0%, #25D366 50%, #134220 100%);
            border-color: #25D366;
            color: #ffffff;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2), 0 0 20px rgba(37, 211, 102, 0.4), 0 6px 15px rgba(0, 0, 0, 0.8);
        }

        footer {
            color: #444;
            font-size: 0.8rem;
            margin-top: auto;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="smoke-container">
        <div class="smoke-blob smoke-1"></div>
        <div class="smoke-blob smoke-2"></div>
        <div class="smoke-blob smoke-3"></div>
    </div>

    <div class="container">
        <header class="header">
            <img src="logo.png" alt="Triqueta Lunar Logo" class="logo-img">
            <h1>Triqueta Lunar</h1>
            <p class="bio">Diseños personalizados y únicos.<br>Impresión UV, Corte Láser e Impresión 3D.<br>Rock, Metal y Gótico.</p>
        </header>

        <h2 class="gallery-title">Nuestro Trabajo</h2>
        <div class="gallery-grid">
            <div class="gallery-item"><img src="foto1.jpeg" alt="Pines de bandas de Metal"></div>
            <div class="gallery-item"><img src="foto2.jpeg" alt="Llaveros personalizados UV"></div>
            <div class="gallery-item"><img src="foto3.jpg" alt="Artículos en impresión 3D"></div>
        </div>

        <div class="links-container">
            <a href="https://wa.me/573125935222?text=¡Hola%20Triqueta%20Lunar!%20Vengo%20de%20su%20página%20y%20quiero%20cotizar%20un%20producto%20personalizado." 
               class="link-btn wsp-btn" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-whatsapp"></i> COTIZAR POR WHATSAPP
            </a>
            <a href="https://www.instagram.com/triquetalunar/" class="link-btn" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-instagram"></i> INSTAGRAM
            </a>
            <a href="https://www.tiktok.com/@triquetalunar" class="link-btn" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-tiktok"></i> TIKTOK
            </a>
            <a href="https://www.facebook.com/TriquetaLunar" class="link-btn" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-facebook-f"></i> FACEBOOK
            </a>
        </div>

        <footer>
            &copy; 2026 Triqueta Lunar. Hecho en Colombia.
        </footer>
    </div>

</body>
</html>
