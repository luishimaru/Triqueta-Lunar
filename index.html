<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triqueta Lunar | Diseños Personalizados</title>
    <meta name="description" content="Diseños personalizados y únicos en corte láser e impresión 3D. Rock, Metal y Gótico.">
    
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-main: #ffffff;
            --text-muted: #b3b3b3;
            --accent: #ffffff;
            --btn-bg: #1a1a1a;
            --btn-hover: #2a2a2a;
            --wsp-color: #25D366;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            /* Puedes agregar una imagen de fondo de humo sutil aquí si lo deseas */
            background-image: radial-gradient(circle at center, #1f1f1f 0%, #000000 100%);
            color: var(--text-main);
            font-family: 'Roboto', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        /* Cabecera y Logo */
        .header {
            margin-bottom: 2rem;
        }

        .logo-img {
            width: 180px;
            height: auto;
            margin-bottom: 1rem;
            /* Efecto de resplandor sutil */
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
        }

        h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 2.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        p.bio {
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 2rem;
        }

        /* Galería de Impacto */
        .gallery-title {
            font-family: 'Oswald', sans-serif;
            font-size: 1.2rem;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #333;
            padding-bottom: 0.5rem;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 2.5rem;
        }

        .gallery-item {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #222;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid #333;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        /* Botones de Enlaces */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 3rem;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--btn-bg);
            color: var(--text-main);
            text-decoration: none;
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid #333;
            font-family: 'Oswald', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            position: relative;
        }

        .link-btn i {
            position: absolute;
            left: 1.5rem;
            font-size: 1.3rem;
        }

        .link-btn:hover {
            background-color: var(--btn-hover);
            border-color: var(--text-main);
            transform: translateY(-2px);
        }

        /* Botón de WhatsApp Destacado */
        .wsp-btn {
            background-color: #121212;
            border: 1px solid var(--wsp-color);
            color: var(--wsp-color);
        }

        .wsp-btn:hover {
            background-color: var(--wsp-color);
            color: #000;
            border-color: var(--wsp-color);
            box-shadow: 0 0 15px rgba(37, 211, 102, 0.4);
        }

        footer {
            color: #555;
            font-size: 0.8rem;
            margin-top: auto;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <header class="header">
            <img src="logo.png" alt="Triqueta Lunar Logo" class="logo-img">
            <h1>Triqueta Lunar</h1>
            <p class="bio">Diseños personalizados y únicos.<br>Impresión UV, Corte Láser e Impresión 3D.<br>Rock, Metal y Gótico.</p>
        </header>

        <h2 class="gallery-title">Nuestro Trabajo</h2>
        <div class="gallery-grid">
            <div class="gallery-item"><img src="foto1.jpeg" alt="Pines de bandas de Metal"></div>
            <div class="gallery-item"><img src="foto2.jpg" alt="Llaveros personalizados UV"></div>
            <div class="gallery-item"><img src="foto3.jpg" alt="Artículos en impresión 3D"></div>
        </div>

        <div class="links-container">
            
            <a href="https://wa.me/573125935222?text=¡Hola%20Triqueta%20Lunar!%20Vengo%20de%20su%20página%20y%20quiero%20cotizar%20un%20producto%20personalizado." 
               class="link-btn wsp-btn" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-whatsapp"></i>
                COTIZAR POR WHATSAPP
            </a>

            <a href="https://www.instagram.com/triquetalunar/" class="link-btn" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-instagram"></i>
                INSTAGRAM
            </a>

            <a href="https://www.tiktok.com/@triquetalunar" class="link-btn" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-tiktok"></i>
                TIKTOK
            </a>

            <a href="https://www.facebook.com/TriquetaLunar" class="link-btn" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-facebook-f"></i>
                FACEBOOK
            </a>

        </div>

        <footer>
            &copy; 2026 Triqueta Lunar. Hecho en Colombia.
        </footer>

    </div>

</body>
</html>
